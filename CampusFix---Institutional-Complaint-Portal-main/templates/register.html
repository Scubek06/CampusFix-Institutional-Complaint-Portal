{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-person-plus"></i> 
                        Register for CampusFix
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('register') }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">Username *</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="username" 
                                       name="username" 
                                       value="{{ form_data.username if form_data else '' }}"
                                       placeholder="Choose a username"
                                       minlength="3"
                                       required>
                                <small class="text-muted">Minimum 3 characters</small>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email *</label>
                                <input type="email" 
                                       class="form-control" 
                                       id="email" 
                                       name="email" 
                                       value="{{ form_data.email if form_data else '' }}"
                                       placeholder="Enter your email"
                                       required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">Password *</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       name="password" 
                                       placeholder="Create password"
                                       minlength="6"
                                       required>
                                <small class="text-muted">Minimum 6 characters</small>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="confirm_password" class="form-label">Confirm Password *</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="confirm_password" 
                                       name="confirm_password" 
                                       placeholder="Confirm password"
                                       required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="role" class="form-label">Register as *</label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="student" selected>Student</option>
                                    <option value="staff">Staff Member</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label">Department</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="department" 
                                       name="department" 
                                       value="{{ form_data.department if form_data else '' }}"
                                       placeholder="e.g., Computer Science">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3" id="roll_number_field">
                                <label for="roll_number" class="form-label">Roll Number (Students only)</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="roll_number" 
                                       name="roll_number" 
                                       value="{{ form_data.roll_number if form_data else '' }}"
                                       placeholder="Enter your roll number">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" 
                                       class="form-control" 
                                       id="phone" 
                                       name="phone" 
                                       value="{{ form_data.phone if form_data else '' }}"
                                       placeholder="Enter your phone number">
                            </div>
                        </div>
                        
                        <!--<div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label" for="terms">
                                I agree to the <a href="#" target="_blank">Terms and Conditions</a> *
                            </label>
                        </div>-->
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-person-plus"></i> Register
                            </button>
                        </div>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Show/hide roll number field based on role selection
document.getElementById('role').addEventListener('change', function() {
    const rollNumberField = document.getElementById('roll_number_field');
    if (this.value === 'student') {
        rollNumberField.style.display = 'block';
        document.getElementById('roll_number').required = true;
    } else {
        rollNumberField.style.display = 'none';
        document.getElementById('roll_number').required = false;
    }
});

// Password match validation
document.getElementById('confirm_password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirm = this.value;
    
    if (password !== confirm) {
        this.setCustomValidity('Passwords do not match');
    } else {
        this.setCustomValidity('');
    }
});
</script>
{% endblock %}
